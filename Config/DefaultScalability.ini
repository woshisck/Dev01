; DevKit UE5.8 performance tiers.
; These sections extend Unreal's BaseScalability.ini with project-specific
; Epic/High/Mid/Low defaults. Runtime UI should apply the matching sg.* levels plus
; project material-light and batch-proxy settings.

[ViewDistanceQuality@0]
r.ViewDistanceScale=0.45
r.SkeletalMeshLODBias=2

[ViewDistanceQuality@1]
r.ViewDistanceScale=0.6
r.SkeletalMeshLODBias=1

[ViewDistanceQuality@2]
r.ViewDistanceScale=0.85
r.SkeletalMeshLODBias=0

[ViewDistanceQuality@3]
r.ViewDistanceScale=1.0
r.SkeletalMeshLODBias=0

[ShadowQuality@0]
r.ShadowQuality=0
r.Shadow.MaxResolution=512
r.Shadow.MaxCSMResolution=512
r.Shadow.CSM.MaxCascades=1
r.Shadow.DistanceScale=0.45
r.LightMaxDrawDistanceScale=0.35
r.DistanceFieldShadowing=0
r.VolumetricFog=0
r.Shadow.Virtual.Enable=0

[ShadowQuality@1]
r.ShadowQuality=2
r.Shadow.MaxResolution=1024
r.Shadow.MaxCSMResolution=1024
r.Shadow.CSM.MaxCascades=1
r.Shadow.DistanceScale=0.6
r.LightMaxDrawDistanceScale=0.5
r.DistanceFieldShadowing=0
r.VolumetricFog=0
r.Shadow.Virtual.Enable=0

[ShadowQuality@2]
r.ShadowQuality=3
r.Shadow.MaxResolution=1536
r.Shadow.MaxCSMResolution=1536
r.Shadow.CSM.MaxCascades=2
r.Shadow.DistanceScale=0.85
r.LightMaxDrawDistanceScale=0.75
r.DistanceFieldShadowing=1
r.VolumetricFog=0
r.Shadow.Virtual.Enable=0

[ShadowQuality@3]
r.ShadowQuality=4
r.Shadow.MaxResolution=2048
r.Shadow.MaxCSMResolution=2048
r.Shadow.CSM.MaxCascades=3
r.Shadow.DistanceScale=1.0
r.LightMaxDrawDistanceScale=1.0
r.DistanceFieldShadowing=1
r.VolumetricFog=1
r.Shadow.Virtual.Enable=0

[GlobalIlluminationQuality@0]
r.AOQuality=0
r.DistanceFieldAO=0
r.SkylightIntensityMultiplier=0.8
r.Lumen.DiffuseIndirect.Allow=0
r.LumenScene.Radiosity=0

[GlobalIlluminationQuality@1]
; UE5.8 Lumen Lite / Mid GI candidate.
r.DistanceFieldAO=1
r.SkylightIntensityMultiplier=1.0
r.AOQuality=1
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.FinalGatherMethod=0
r.LumenScene.SurfaceCache.AtlasSize=2048
r.LumenScene.SurfaceCache.CardTexelDensityScale=50
r.LumenScene.SurfaceCache.CardMinResolution=2
r.LumenScene.SurfaceCache.CardMaxResolution=256
r.LumenScene.DirectLighting.MaxLightsPerTile=4
r.LumenScene.DirectLighting.UpdateFactor=128
r.LumenScene.Radiosity.UpdateFactor=128
r.LumenScene.Radiosity.ProbeSpacing=4
r.Lumen.ScreenProbeGather.RadianceCache.ProbeResolution=8
r.Lumen.ScreenProbeGather.DownsampleFactor=32
r.Lumen.TraceMeshSDFs.Allow=0
r.Lumen.TranslucencyVolume.Enable=0
r.Lumen.HardwareRayTracing.HitLighting.Allowed=0
r.RayTracing.Scene.BuildMode=0
r.RayTracing.Geometry.SkeletalMeshes=0
r.MeshCardRepresentation.SkeletalMesh=0
r.RayTracing.DynamicGeometry.MaxUpdatePrimitivesPerFrame=1000

[GlobalIlluminationQuality@2]
r.DistanceFieldAO=1
r.SkylightIntensityMultiplier=1.0
r.AOQuality=2
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.FinalGatherMethod=1
r.LumenScene.SurfaceCache.AtlasSize=3072
r.LumenScene.DirectLighting.MaxLightsPerTile=8
r.LumenScene.DirectLighting.UpdateFactor=64
r.LumenScene.Radiosity.UpdateFactor=64
r.Lumen.ScreenProbeGather.DownsampleFactor=16

[GlobalIlluminationQuality@3]
r.DistanceFieldAO=1
r.SkylightIntensityMultiplier=1.0
r.AOQuality=2
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.FinalGatherMethod=1
r.LumenScene.SurfaceCache.AtlasSize=4096
r.LumenScene.DirectLighting.MaxLightsPerTile=16
r.LumenScene.DirectLighting.UpdateFactor=32
r.LumenScene.Radiosity.UpdateFactor=32
r.Lumen.ScreenProbeGather.DownsampleFactor=8

[ReflectionQuality@0]
r.SSR.Quality=0
r.Lumen.Reflections.Allow=0

[ReflectionQuality@1]
; Mid reflections stay on SSR for the Lumen Lite validation path.
r.SSR.Quality=2
r.SSR.HalfResSceneColor=1
r.Lumen.Reflections.Allow=0

[ReflectionQuality@2]
r.SSR.Quality=2
r.SSR.HalfResSceneColor=1
r.Lumen.Reflections.Allow=1
r.Lumen.Reflections.DownsampleFactor=2

[ReflectionQuality@3]
r.SSR.Quality=3
r.SSR.HalfResSceneColor=0
r.Lumen.Reflections.Allow=1
r.Lumen.Reflections.DownsampleFactor=1

[PostProcessQuality@0]
r.MotionBlurQuality=0
r.BloomQuality=2
r.DepthOfFieldQuality=0
r.LocalExposure=0

[PostProcessQuality@1]
r.MotionBlurQuality=0
r.BloomQuality=3
r.DepthOfFieldQuality=0
r.LocalExposure=0

[PostProcessQuality@2]
r.MotionBlurQuality=0
r.BloomQuality=4
r.DepthOfFieldQuality=1
r.LocalExposure=1

[PostProcessQuality@3]
r.MotionBlurQuality=0
r.BloomQuality=5
r.DepthOfFieldQuality=2
r.LocalExposure=1

[TextureQuality@0]
r.Streaming.MipBias=1
r.MaxAnisotropy=2

[TextureQuality@1]
r.Streaming.MipBias=0
r.MaxAnisotropy=4

[TextureQuality@2]
r.Streaming.MipBias=0
r.MaxAnisotropy=8

[TextureQuality@3]
r.Streaming.MipBias=0
r.MaxAnisotropy=8

[EffectsQuality@0]
fx.Niagara.QualityLevel=0
r.MaterialQualityLevel=0

[EffectsQuality@1]
fx.Niagara.QualityLevel=1
r.MaterialQualityLevel=1

[EffectsQuality@2]
fx.Niagara.QualityLevel=2
r.MaterialQualityLevel=1

[EffectsQuality@3]
fx.Niagara.QualityLevel=3
r.MaterialQualityLevel=1

[FoliageQuality@0]
foliage.DensityScale=0.35
grass.DensityScale=0.35

[FoliageQuality@1]
foliage.DensityScale=0.55
grass.DensityScale=0.55

[FoliageQuality@2]
foliage.DensityScale=0.8
grass.DensityScale=0.8

[FoliageQuality@3]
foliage.DensityScale=1.0
grass.DensityScale=1.0
