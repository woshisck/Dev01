; DevKit 性能分级档位定义。
; 四档：低/中/高/超高，对应 DefaultScalability.ini 的 @0/@1/@2/@3。
; 使用方式：命令行 -DeviceProfile=DevKit_Low 或运行时通过 YogPerformanceSettingsLibrary 应用。

[DevKit_Ultra DeviceProfile]
DeviceType=Windows
BaseProfileName=Windows
bIsVisibleForAssets=True
+CVars=sg.ViewDistanceQuality=3
+CVars=sg.AntiAliasingQuality=3
+CVars=sg.ShadowQuality=3
+CVars=sg.GlobalIlluminationQuality=3
+CVars=sg.ReflectionQuality=3
