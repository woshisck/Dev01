GameplayTagList=(Tag="Buff.Status.HeatDecayBlocked",DevComment="【Status】热度衰减阻断守卫；Rune 1002 FA_Rune_HeatUp 激活时由 Add Tag(Infinite) 授予，FA 停止时 Cleanup 自动移除；C++ PreGameplayEffectExecute 检测此 Tag 后阻断所有负数热度 GE（与 Heat.Active 并列）；与 HeatInhibit 分离：HeatInhibit 暂停热度增加，HeatDecayBlocked 阻断热度衰减")
GameplayTagList=(Tag="Buff.Status.HeatInhibit",DevComment="【Status】热度积累暂停守卫；受到伤害时由 FA_Rune_HeatUp 通过 Grant Tag Timed 授予（持续 5 秒），On Periodic 每次 Tick 前检测此 Tag，存在时跳过热度累加；Tag 过期后自动恢复")
GameplayTagList=(Tag="Buff.Status.DashInvincible",DevComment="【Status】冲刺无敌帧，GA_PlayerDash ActivationOwnedTags 自动授予，GA 结束时自动移除；伤害管道检测此 Tag 跳过伤害")
GameplayTagList=(Tag="Buff.Status.DuoAssaultReady",DevComment="【Status】突刺连击（Rune 1010）冲刺后激活的 2 秒攻击窗口；On Dash 时由 Grant Tag Timed 授予，下一次 On Damage Dealt 命中时 FA 手动消耗（Remove Tag），2 秒未攻击则自动过期")
GameplayTagList=(Tag="Buff.Status.NextHitCrit",DevComment="【Status】下一次伤害强制暴击信号；弱点窥破（Rune 1009）检测到末击后由 FA Add Tag 授予，C++ 伤害管线在计算暴击前检测此 Tag 并消费（RemoveLooseGameplayTag），实现真实暴击并触发 On Crit Hit 事件；测试版 FA 暂不使用此 Tag")
